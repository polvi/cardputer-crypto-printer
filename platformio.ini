; M5Stack Cardputer -> Matica C330 embosser (USB host -> FTDI)
;
; Uses the pioarduino platform (arduino-esp32 3.x / ESP-IDF 5.x) because the
; USB-host FTDI driver is an IDF 5.x component. USB CDC-on-boot is off because
; the USB-OTG port is used as a host, not a serial device.

[env:m5stack-cardputer]
platform = https://github.com/pioarduino/platform-espressif32/releases/download/53.03.13/platform-espressif32.zip
board = esp32-s3-devkitc-1
framework = arduino, espidf
upload_speed = 1500000

build_flags =
    -DARDUINO_USB_MODE=1
    -DARDUINO_USB_CDC_ON_BOOT=0

; Air-gapped device: drop every cloud / radio / network component arduino-esp32
; would otherwise pull in. The firmware only ever drives USB-serial to the C330;
; it never starts WiFi or Bluetooth, and Bluetooth is disabled in sdkconfig too.
;   - RainMaker/Insights cloud stack (also breaks the build via a missing cert)
;   - Zigbee / 802.15.4 radio
;   - Cellular modem + mDNS network discovery
custom_component_remove =
    espressif/esp_rainmaker
    espressif/esp_insights
    espressif/esp_diagnostics
    espressif/esp_diag_data_store
    espressif/rmaker_common
    espressif/network_provisioning
    espressif/cbor
    espressif/qrcode
    espressif/esp-zboss-lib
    espressif/esp-zigbee-lib
    espressif/esp_modem
    espressif/mdns
    espressif/esp_hosted
    espressif/esp_wifi_remote

lib_deps =
    M5Cardputer=https://github.com/m5stack/M5Cardputer
