; M5Stack Cardputer -> Matica C330 embosser (USB host -> FTDI)
;
; Two environments:
;   m5stack-cardputer  -> the real firmware (default build)
;   sim                -> desktop SDL2 build of the UI, for fast UI iteration
;                         on a PC. Run with: pio run -e sim -t exec
;
; Uses the pioarduino platform (arduino-esp32 3.x / ESP-IDF 5.x) because the
; USB-host FTDI driver is an IDF 5.x component. USB CDC-on-boot is off because
; the USB-OTG port is used as a host, not a serial device.

[platformio]
default_envs = m5stack-cardputer

[env:m5stack-cardputer]
platform = https://github.com/pioarduino/platform-espressif32/releases/download/53.03.13/platform-espressif32.zip
board = esp32-s3-devkitc-1
framework = arduino, espidf
upload_speed = 1500000
build_src_filter = +<*> -<sim_main.cpp>

build_flags =
    -DARDUINO_USB_MODE=1
    -DARDUINO_USB_CDC_ON_BOOT=0
    ; real wallet crypto (trezor-crypto, device only)
    -DWALLET_REAL_CRYPTO
    -DUSE_BIP32_25519_CURVES=0
    -DUSE_MONERO=1
    -DUSE_KECCAK=1
    ; on-screen label for the print trigger (physical G0 button)
    '-DUI_PRINT_KEY="G0"'
    -Ilib/trezor-crypto

; Air-gapped device: drop every cloud / radio / network component arduino-esp32
; would otherwise pull in. The firmware only ever drives USB-serial to the C330;
; it never starts WiFi or Bluetooth, and Bluetooth is disabled in sdkconfig too.
;   - RainMaker/Insights cloud stack (also breaks the build via a missing cert)
;   - Zigbee / 802.15.4 radio
;   - Cellular modem + mDNS network discovery
custom_component_remove =
    espressif/esp_rainmaker
    espressif/esp_insights
    espressif/esp_diagnostics
    espressif/esp_diag_data_store
    espressif/rmaker_common
    espressif/network_provisioning
    espressif/cbor
    espressif/qrcode
    espressif/esp-zboss-lib
    espressif/esp-zigbee-lib
    espressif/esp_modem
    espressif/mdns
    espressif/esp_hosted
    espressif/esp_wifi_remote

lib_deps =
    M5Cardputer=https://github.com/m5stack/M5Cardputer
    trezor-crypto

; --- Desktop UI simulator (macOS / Apple Silicon, SDL2 via Homebrew) ----------
; Builds only ui.cpp + sim_main.cpp into a native executable that renders the
; UI in an SDL window and reads the Mac keyboard (incl. arrow keys).
; Prereq: brew install sdl2
[env:sim]
platform = native
build_type = debug
build_src_filter = -<*> +<ui.cpp> +<wallet.cpp> +<c330_format.cpp> +<sim_main.cpp>
build_flags =
    -xc++ -std=c++14 -O0
    -arch arm64
    -DM5GFX_SHOW_FRAME
    -DM5GFX_BACK_COLOR=0x222222u
    ; on-screen label for the print trigger (Cmd+Enter in the sim)
    '-DUI_PRINT_KEY="Cmd+Enter"'
    -I"/opt/homebrew/opt/sdl2/include/SDL2"
    -L"/opt/homebrew/opt/sdl2/lib"
    -lSDL2
lib_deps =
    m5stack/M5GFX
